name: Release client

# Builds the standalone Go client for every OS/arch and publishes a GitHub
# Release. Version = YYYY-MM-DD-N, where N restarts at 1 each (UTC) day and
# increments for every release made that day.

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/release-client.yml'
  workflow_dispatch:

# Serialize runs so two releases on the same day can't compute the same N.
concurrency:
  group: release-client
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: compute
        run: |
          git fetch --tags --force
          DATE=$(date -u +%Y-%m-%d)
          LAST=$(git tag -l "${DATE}-*" | sed "s/^${DATE}-//" | grep -E '^[0-9]+$' | sort -n | tail -1)
          N=$(( ${LAST:-0} + 1 ))
          echo "version=${DATE}-${N}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${DATE}-${N}"

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64, name: linux-x64, ext: '' }
          - { goos: linux, goarch: arm64, name: linux-arm64, ext: '' }
          - { goos: darwin, goarch: amd64, name: macos-x64, ext: '' }
          - { goos: darwin, goarch: arm64, name: macos-arm64, ext: '' }
          - { goos: windows, goarch: amd64, name: windows-x64, ext: '.exe' }
          - { goos: windows, goarch: arm64, name: windows-arm64, ext: '.exe' }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: client/go.mod
          cache-dependency-path: client/go.sum
      - name: Build
        working-directory: client
        env:
          CGO_ENABLED: '0'
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/out"
          out="$GITHUB_WORKSPACE/out/ed-dashboard-client-${{ matrix.name }}${{ matrix.ext }}"
          go build -trimpath -ldflags "-s -w -X main.version=${VERSION}" -o "$out" .
      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.name }}
          path: out/*
          if-no-files-found: error

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          ls -la dist
          gh release create "$VERSION" dist/* \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --notes "ED Dashboard client ${VERSION}. Standalone binaries for Linux, macOS, and Windows (x64 + arm64). See the README for setup."
