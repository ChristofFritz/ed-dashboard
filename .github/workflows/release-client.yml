name: Release client

# Builds the double-clickable GUI client (Fyne) natively on each OS/arch and
# publishes a GitHub Release. Version = YYYY-MM-DD-N, where N restarts at 1 each
# (UTC) day and increments for every release made that day.

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/release-client.yml'
  workflow_dispatch:

# Serialize runs so two releases on the same day can't compute the same N.
concurrency:
  group: release-client
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: compute
        run: |
          git fetch --tags --force
          DATE=$(date -u +%Y-%m-%d)
          LAST=$(git tag -l "${DATE}-*" | sed "s/^${DATE}-//" | grep -E '^[0-9]+$' | sort -n | tail -1)
          N=$(( ${LAST:-0} + 1 ))
          echo "version=${DATE}-${N}" >> "$GITHUB_OUTPUT"
          echo "Next version: ${DATE}-${N}"

  build:
    needs: version
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: linux-x64, os: linux, runner: ubuntu-latest }
          - { name: linux-arm64, os: linux, runner: ubuntu-24.04-arm }
          - { name: macos-x64, os: macos, runner: macos-15-intel }
          - { name: macos-arm64, os: macos, runner: macos-14 }
          - { name: windows-x64, os: windows, runner: windows-latest }
          - { name: windows-arm64, os: windows, runner: windows-11-arm }
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: client/go.mod
          cache-dependency-path: client/go.sum

      - name: Install Linux GUI build deps
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev libxkbcommon-dev

      - name: Build & package
        working-directory: client
        env:
          CGO_ENABLED: '1'
          VERSION: ${{ needs.version.outputs.version }}
          NAME: ${{ matrix.name }}
        run: |
          set -euo pipefail
          OUT="$GITHUB_WORKSPACE/out"
          mkdir -p "$OUT"
          LDFLAGS="-s -w -X main.version=$VERSION"
          case "${{ matrix.os }}" in
            linux)
              go build -trimpath -ldflags "$LDFLAGS" -o "$OUT/ed-dashboard-client-$NAME" .
              ;;
            windows)
              # -H=windowsgui => no console window pops up on double-click.
              go build -trimpath -ldflags "$LDFLAGS -H=windowsgui" -o "$OUT/ed-dashboard-client-$NAME.exe" .
              ;;
            macos)
              go build -trimpath -ldflags "$LDFLAGS" -o /tmp/eddc .
              APP="ED Dashboard Client.app"
              rm -rf "$APP"
              mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
              cp packaging/macos/Info.plist "$APP/Contents/Info.plist"
              cp /tmp/eddc "$APP/Contents/MacOS/ed-dashboard-client"
              # Finder icon from Icon.png (best effort).
              mkdir -p icon.iconset
              for s in 16 32 128 256 512; do
                sips -z $s $s Icon.png --out "icon.iconset/icon_${s}x${s}.png" >/dev/null
                d=$((s*2)); sips -z $d $d Icon.png --out "icon.iconset/icon_${s}x${s}@2x.png" >/dev/null
              done
              iconutil -c icns icon.iconset -o "$APP/Contents/Resources/icon.icns" || true
              ditto -c -k --keepParent "$APP" "$OUT/ed-dashboard-client-$NAME.zip"
              ;;
          esac
          ls -la "$OUT"

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.name }}
          path: out/*
          if-no-files-found: error

  release:
    needs: [version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: bin-*
          merge-multiple: true
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.version.outputs.version }}
        run: |
          ls -la dist
          gh release create "$VERSION" dist/* \
            --target "$GITHUB_SHA" \
            --title "$VERSION" \
            --notes "ED Dashboard client ${VERSION} — double-click GUI app with config, live log, and status.

          - **Windows**: \`.exe\` (x64 / arm64)
          - **macOS**: \`.app\` in a zip (x64 / arm64); first launch: right-click → Open (unsigned)
          - **Linux**: raw binary (x64 / arm64); needs a desktop with OpenGL

          See the README for setup."
